<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Bump - Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #7C3AED;
      --color-secondary: #F9A8D4;
      --color-tertiary: #6EE7B7;
      --color-background: #F5F3FF;
      --color-surface: #FAFAFA;
      --color-text-primary: #1F2937;
      --color-text-secondary: #6B7280;
      --color-border: #E5E7EB;
      --color-white: #FFFFFF;
      --radius-card: 16px;
      --spacing-unit: 8px;
      --font-family: 'Nunito', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      font-family: var(--font-family);
      background: #1E1B2E;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }

    .phone {
      width: 375px;
      min-height: 812px;
      background: var(--color-background);
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    }

    .status-bar {
      height: 44px;
      background: var(--color-background);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .status-bar-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .status-bar-icons svg {
      width: 18px;
      height: 18px;
    }

    .app-bar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      background: var(--color-background);
    }

    .app-bar-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .content {
      padding: 0 16px 100px;
      overflow-y: auto;
    }

    .section {
      margin-bottom: 24px;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: transform 200ms ease-out;
      border: 1px solid var(--color-border);
    }

    .card:hover {
      transform: scale(0.98);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card-icon-container {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon-container svg {
      width: 24px;
      height: 24px;
    }

    .card-text {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    .card-description {
      font-size: 14px;
      font-weight: 400;
      color: var(--color-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-chevron {
      width: 24px;
      height: 24px;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }

    .card-health-log .card-icon-container {
      background: rgba(124, 58, 237, 0.15);
    }

    .card-health-log .card-icon-container svg {
      color: var(--color-primary);
    }

    .card-mood .card-icon-container {
      background: rgba(249, 168, 212, 0.2);
    }

    .card-mood .card-icon-container svg {
      color: var(--color-secondary);
    }

    .card-education .card-icon-container {
      background: rgba(110, 231, 183, 0.2);
    }

    .card-education .card-icon-container svg {
      color: var(--color-tertiary);
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--color-white);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
      border-top: 1px solid var(--color-border);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      border: none;
      background: none;
      cursor: pointer;
      position: relative;
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 40px;
      height: 4px;
      background: var(--color-primary);
      border-radius: 2px;
      opacity: 0.15;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      color: var(--color-text-secondary);
    }

    .nav-item.active svg {
      color: var(--color-primary);
    }

    .nav-item span {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .nav-item.active span {
      font-weight: 600;
      color: var(--color-primary);
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--color-text-primary);
      border-radius: 3px;
      opacity: 0.2;
    }

    /* Animation keyframes */
    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      opacity: 0;
      animation: fade-in 300ms ease-out forwards;
    }

    .card:nth-child(1) {
      animation-delay: 0ms;
    }

    .card:nth-child(2) {
      animation-delay: 100ms;
    }

    .card:nth-child(3) {
      animation-delay: 200ms;
    }

    /* Screen fade-in */
    .phone {
      opacity: 0;
      animation: fade-in 300ms ease-out forwards;
      animation-delay: 0ms;
    }
  </style>
</head>
<body>
  <div class="phone scaffold" data-flutter="scaffold" data-bg="background">

    <div class="status-bar" data-color="text-primary" data-spacing="xs">
      <span>9:41</span>
      <div class="status-bar-icons">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="2" y="7" width="18" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
          <rect x="4" y="9" width="14" height="6" rx="1" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <header class="app-bar" data-flutter="app-bar" data-color="primary" data-spacing="md">
      <h1 class="app-bar-title" data-color="text-primary" data-spacing="xs">Library</h1>
    </header>

    <main class="content body" data-flutter="body" role="main" aria-label="Library screen">
      <section class="section column" aria-label="Navigation cards" data-spacing="lg">
        <!-- Health Log Card -->
        <div class="card card-health-log"
             role="link"
             tabindex="0"
             aria-label="Health Log, double tap to open health log screen"
             data-flutter="card"
             data-route="/health-log">
          <div class="card-row">
            <div class="card-icon-container">
              <!-- favorite_outline -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </div>
            <div class="card-text">
              <h2 class="card-title">Health Log</h2>
              <p class="card-description">Track symptoms, doctor visits, reminders</p>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <!-- Mood & Wellness Card -->
        <div class="card card-mood"
             role="link"
             tabindex="0"
             aria-label="Mood and Wellness, double tap to open mood and wellness screen"
             data-flutter="card"
             data-route="/mood-wellness">
          <div class="card-row">
            <div class="card-icon-container">
              <!-- mood_outlined -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
              </svg>
            </div>
            <div class="card-text">
              <h2 class="card-title">Mood & Wellness</h2>
              <p class="card-description">Log moods, track energy levels</p>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>

        <!-- Education Card -->
        <div class="card card-education"
             role="link"
             tabindex="0"
             aria-label="Education, double tap to open education screen"
             data-flutter="card"
             data-route="/education">
          <div class="card-row">
            <div class="card-icon-container">
              <!-- school_outlined -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
              </svg>
            </div>
            <div class="card-text">
              <h2 class="card-title">Education</h2>
              <p class="card-description">Browse articles and trusted health info</p>
            </div>
            <svg class="card-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" data-flutter="bottom-nav" role="navigation" aria-label="Main navigation">
      <button class="nav-item" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item" aria-label="Browse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>Browse</span>
      </button>
      <button class="nav-item active" aria-current="page" aria-label="Library">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Library</span>
      </button>
      <button class="nav-item" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
        </svg>
        <span>Profile</span>
      </button>
    </nav>

    <div class="home-indicator"></div>
  </div>
</body>
</html>
